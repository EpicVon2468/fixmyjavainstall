[package]
name = "fuji"
version = "0.2.1"
authors = ["Mavity The Madity"]
edition = "2024"
rust-version = "1.95.0"
description = "A JVM & Kotlin management utility"
readme = "README.md"
homepage = "https://github.com/EpicVon2468/fixmyjavainstall/"
repository = "https://github.com/EpicVon2468/fixmyjavainstall/"
license = "MIT OR Apache-2.0"
keywords = ["utility", "config", "cli"]
categories = ["command-line-utilities", "config"]
exclude = [".github/", "doc/", "listing/", "*.desktop"]
publish = false
default-run = "fuji"
autolib = false
autobins = false

[features]
multi-os = []
dev = []

[lib]
name = "fuji"
path = "src/fuji.rs"
test = true
doctest = false
bench = true
doc = true
proc-macro = false
harness = true

[[bin]]
name = "fuji"
path = "src/bin/main.rs"
test = false
doctest = false
bench = false
doc = false
harness = false

[[bin]]
name = "fuji-jvm"
path = "src/bin/jvm.rs"
test = false
doctest = false
bench = false
doc = false
harness = false

[[bin]]
name = "fuji-kt"
path = "src/bin/kt.rs"
test = false
doctest = false
bench = false
doc = false
harness = false

[dependencies]
clap = { version = "4.6.1", features = ["derive", "string", "unstable-markdown", "unicode", "unstable-v5"] }
clap_mangen = "0.3.0"
serde = { version = "1.0.228", features = ["derive"] }
which = "8.0.2"
tar = { version = "0.4.45", default-features = false }
flate2 = "1.1.9"
ureq = { version = "3.3.0", features = ["json", "rustls"], default-features = false }
indicatif = { version = "0.18.4", features = ["improved_unicode"], default-features = false }
anyhow = "1.0.102"
zip = { version = "8.5.1", features = ["deflate-flate2"], default-features = false }

[target.'cfg(windows)'.dependencies]
windows-registry = "0.6.1"

[package.metadata.dist]
dist = true

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"