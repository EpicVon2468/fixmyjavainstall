[package]
name = "fixmyjavainstall"
authors = ["Mavity The Madity"]
version = "0.0.0"
edition = "2024"
repository = "https://github.com/EpicVon2468/fixmyjavainstall"
homepage = "https://github.com/EpicVon2468/fixmyjavainstall"

[features]
multi_os = []

[[bin]]
name = "fuji"
path = "src/main.rs"

[dependencies]
clap = { version = "4.6.0", features = ["derive", "string"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"