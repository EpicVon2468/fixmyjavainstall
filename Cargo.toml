[package]
name = "fuji"
authors = ["Mavity The Madity"]
version = "0.1.2"
edition = "2024"
repository = "https://github.com/EpicVon2468/fixmyjavainstall/"
homepage = "https://github.com/EpicVon2468/fixmyjavainstall/"

[features]
multi_os = []
dev = []

[[bin]]
name = "fuji"
path = "src/bin/main.rs"

[[bin]]
name = "fuji-jvm"
path = "src/bin/jvm.rs"

[[bin]]
name = "fuji-kt"
path = "src/bin/kt.rs"

[dependencies]
clap = { version = "4.6.0", features = ["derive", "string"] }
clap_mangen = "0.3.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
which = "8.0.2"
windows-registry = "0.6.1"
tar = "0.4.45"
flate2 = "1.1.9"

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"