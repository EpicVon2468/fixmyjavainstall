[package]
name = "fixmyjavainstall"
authors = ["Mavity The Madity"]
version = "0.1.1"
edition = "2024"
repository = "https://github.com/EpicVon2468/fixmyjavainstall"
homepage = "https://github.com/EpicVon2468/fixmyjavainstall"

[features]
multi_os = []

[[bin]]
name = "fuji"
path = "src/main.rs"

[dependencies]
clap = { version = "4.6.0", features = ["derive", "string"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
which = "8.0.2"
windows-registry = "0.6.1"

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"