[package]
name = "fuji"
description = "Fix Ur Java Install – A JVM & Kotlin management utility"
authors = ["Mavity The Madity"]
version = "0.1.5"
edition = "2024"
repository = "https://github.com/EpicVon2468/fixmyjavainstall/"
homepage = "https://github.com/EpicVon2468/fixmyjavainstall/"
license = "MIT OR Apache-2.0"
readme = "README.md"
categories = ["command-line-utilities", "config"]

[features]
multi-os = []
dev = []

[[bin]]
name = "fuji"
path = "src/bin/main.rs"

[[bin]]
name = "fuji-jvm"
path = "src/bin/jvm.rs"

[[bin]]
name = "fuji-kt"
path = "src/bin/kt.rs"

[dependencies]
clap = { version = "4.6.0", features = ["derive", "string"] }
clap_mangen = "0.3.0"
serde = { version = "1.0.228", features = ["derive"] }
which = "8.0.2"
windows-registry = "0.6.1"
tar = { version = "0.4.45", default-features = false }
flate2 = "1.1.9"
ureq = { version = "3.3.0", features = ["json", "rustls"], default-features = false }
indicatif = { version = "0.18.4", features = ["improved_unicode"], default-features = false }
anyhow = "1.0.102"
zip = { version = "8.5.1", features = ["deflate-flate2"], default-features = false }

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"